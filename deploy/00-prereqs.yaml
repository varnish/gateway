# Prerequisites: Namespace and CRDs
apiVersion: v1
kind: Namespace
metadata:
  name: varnish-gateway-system
  labels:
    app.kubernetes.io/name: varnish-gateway
    app.kubernetes.io/component: operator
---
# GatewayClassParameters CRD for user VCL configuration
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatewayclassparameters.gateway.varnish-software.com
spec:
  group: gateway.varnish-software.com
  names:
    kind: GatewayClassParameters
    listKind: GatewayClassParametersList
    plural: gatewayclassparameters
    singular: gatewayclassparameters
    shortNames:
      - gcp
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: GatewayClassParameters contains configuration for a GatewayClass.
          properties:
            apiVersion:
              type: string
              description: API version of the resource
            kind:
              type: string
              description: Kind of the resource
            metadata:
              type: object
            spec:
              type: object
              description: Specification of the GatewayClassParameters
              properties:
                userVCLConfigMapRef:
                  type: object
                  description: |
                    Reference to a ConfigMap containing user VCL.
                    The user VCL will be appended to the generated VCL.
                  required:
                    - name
                    - namespace
                  properties:
                    name:
                      type: string
                      description: Name of the ConfigMap
                      minLength: 1
                    namespace:
                      type: string
                      description: Namespace of the ConfigMap
                      minLength: 1
                    key:
                      type: string
                      description: Key in the ConfigMap data containing the VCL. Defaults to "user.vcl"
                varnishdExtraArgs:
                  type: array
                  description: |
                    Additional command-line arguments to pass to varnishd.
                    Each element is a separate argument (e.g., ["-p", "thread_pools=4"]).
                    Protected arguments (-M, -S, -F, -f, -n) cannot be overridden.
                  items:
                    type: string
                logging:
                  type: object
                  description: |
                    Logging configures varnish log output via a sidecar container.
                    When enabled, a sidecar container runs varnishlog or varnishncsa,
                    streaming logs to stdout where they're captured by Kubernetes.
                  required:
                    - mode
                  properties:
                    mode:
                      type: string
                      description: |
                        Mode determines which varnish logging tool to use.
                        Valid values: "varnishlog", "varnishncsa"
                        Future: "varnishlog-json" when available
                      enum:
                        - varnishlog
                        - varnishncsa
                    format:
                      type: string
                      description: |
                        Format specifies the output format for varnishncsa.
                        Only used when mode is "varnishncsa".
                        Example: "%h %l %u %t \"%r\" %s %b"
                        See varnishncsa(1) for format specification.
                    extraArgs:
                      type: array
                      description: |
                        ExtraArgs specifies additional arguments to pass to the logging tool.
                        Each element is a separate argument (e.g., ["-g", "request", "-q", "ReqURL ~ \"/api\""])
                      items:
                        type: string
                    image:
                      type: string
                      description: |
                        Image specifies the container image containing varnish logging tools.
                        Defaults to the same image as the gateway if not specified.
                extraVolumes:
                  type: array
                  description: Additional volumes to add to the varnish pod.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                extraVolumeMounts:
                  type: array
                  description: Additional volume mounts for the main varnish-gateway container.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                extraInitContainers:
                  type: array
                  description: Additional init containers to run before the main container.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                resources:
                  type: object
                  description: |
                    Resource requirements for the main varnish-gateway container.
                    If not set, defaults to requests of 100m CPU and 256Mi memory with no limits.
                    Varnish memory usage varies by deployment, so users should configure limits
                    appropriate for their workload.
                  x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
---
# VarnishCachePolicy CRD for caching configuration
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: varnishcachepolicies.gateway.varnish-software.com
spec:
  group: gateway.varnish-software.com
  names:
    kind: VarnishCachePolicy
    listKind: VarnishCachePolicyList
    plural: varnishcachepolicies
    singular: varnishcachepolicy
    shortNames:
      - vcp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: VarnishCachePolicy configures caching behavior for routes through a Varnish Gateway.
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: Defines the desired caching behavior.
              required:
                - targetRef
              properties:
                targetRef:
                  type: object
                  description: Identifies the Gateway or HTTPRoute this policy applies to.
                  required:
                    - group
                    - kind
                    - name
                  properties:
                    group:
                      type: string
                      minLength: 1
                    kind:
                      type: string
                      enum:
                        - Gateway
                        - HTTPRoute
                    name:
                      type: string
                      minLength: 1
                    sectionName:
                      type: string
                      minLength: 1
                defaultTTL:
                  type: string
                forcedTTL:
                  type: string
                grace:
                  type: string
                keep:
                  type: string
                requestCoalescing:
                  type: boolean
                cacheKey:
                  type: object
                  properties:
                    headers:
                      type: array
                      items:
                        type: string
                    queryParameters:
                      type: object
                      properties:
                        include:
                          type: array
                          items:
                            type: string
                        exclude:
                          type: array
                          items:
                            type: string
                bypass:
                  type: object
                  properties:
                    headers:
                      type: array
                      items:
                        type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                            minLength: 1
                          valueRegex:
                            type: string
            status:
              type: object
              properties:
                ancestors:
                  type: array
                  items:
                    type: object
                    required:
                      - ancestorRef
                      - controllerName
                    properties:
                      ancestorRef:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      controllerName:
                        type: string
                      conditions:
                        type: array
                        items:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Target Kind
          type: string
          jsonPath: .spec.targetRef.kind
        - name: Target Name
          type: string
          jsonPath: .spec.targetRef.name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
---
# VarnishCacheInvalidation CRD for cache purge/ban operations
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: varnishcacheinvalidations.gateway.varnish-software.com
  labels:
    app.kubernetes.io/name: varnish-gateway
    app.kubernetes.io/component: crds
spec:
  group: gateway.varnish-software.com
  names:
    kind: VarnishCacheInvalidation
    listKind: VarnishCacheInvalidationList
    plural: varnishcacheinvalidations
    singular: varnishcacheinvalidation
    shortNames:
      - vcinv
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            VarnishCacheInvalidation is a one-shot resource that triggers cache purge or ban
            on a Varnish Gateway. Each chaperone pod serving the target gateway processes
            the invalidation independently and reports its result.
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: Defines the desired cache invalidation.
              required:
                - gatewayRef
                - type
                - hostname
                - path
              properties:
                gatewayRef:
                  type: object
                  description: Identifies which Gateway's cache to invalidate.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Name of the Gateway.
                    namespace:
                      type: string
                      description: >-
                        Namespace of the Gateway.
                        Defaults to the VarnishCacheInvalidation's namespace if not specified.
                type:
                  type: string
                  description: >-
                    Invalidation method: Purge (exact URL) or Ban (URL pattern).
                  enum:
                    - Purge
                    - Ban
                hostname:
                  type: string
                  description: Host header value for the invalidation request.
                path:
                  type: string
                  description: >-
                    URL path for the invalidation.
                    For Purge: exact path of the cached object (e.g., "/api/users/123").
                    For Ban: regex pattern matching cached URLs (e.g., "/api/.*").
                ttl:
                  type: string
                  description: >-
                    How long to keep this resource after all pods have completed.
                    The resource is eligible for garbage collection after this duration.
                    Default: 1h
            status:
              type: object
              description: Observed state of the VarnishCacheInvalidation.
              properties:
                phase:
                  type: string
                  description: Aggregate state across all pods.
                  enum:
                    - Pending
                    - InProgress
                    - Complete
                    - Failed
                completedAt:
                  type: string
                  format: date-time
                  description: When the last pod reported, completing the invalidation.
                podResults:
                  type: array
                  description: Per-pod outcomes.
                  items:
                    type: object
                    required:
                      - podName
                      - success
                      - completedAt
                    properties:
                      podName:
                        type: string
                        description: Name of the chaperone pod that processed this invalidation.
                      success:
                        type: boolean
                        description: Whether the invalidation succeeded on this pod.
                      message:
                        type: string
                        description: Details about the result (error message on failure).
                      completedAt:
                        type: string
                        format: date-time
                        description: When this pod completed processing.
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Hostname
          type: string
          jsonPath: .spec.hostname
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
