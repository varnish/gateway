name: Build and Push Docker Images

# This workflow builds and pushes multi-arch Docker images on version tags.
# It runs after CI completes successfully and checks if the commit has a version tag.
# Each image is built natively on amd64 and arm64 runners, then merged into a
# multi-arch manifest.

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/varnish

jobs:
  check-tag:
    runs-on: ubuntu-latest
    # Only proceed if CI succeeded and this is a version tag
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      is-tag: ${{ steps.check.outputs.is_tag }}
      tag-name: ${{ steps.check.outputs.tag_name }}
    steps:
      - name: Check if commit has a version tag
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            core.info(`Checking for tags on commit ${sha}`);

            // Get all version tags
            const { data: refs } = await github.rest.git.listMatchingRefs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'tags/v'
            });

            // Check each tag - need to handle annotated tags
            for (const ref of refs) {
              let commitSha = ref.object.sha;

              // If it's an annotated tag, dereference to get the commit
              if (ref.object.type === 'tag') {
                const { data: tag } = await github.rest.git.getTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_sha: ref.object.sha
                });
                commitSha = tag.object.sha;
              }

              if (commitSha === sha) {
                const tagName = ref.ref.replace('refs/tags/', '');
                core.info(`Found tag: ${tagName}`);
                core.setOutput('is_tag', 'true');
                core.setOutput('tag_name', tagName);
                return;
              }
            }

            core.info('No version tag found for this commit');
            core.setOutput('is_tag', 'false');

  # ── Operator ───────────────────────────────────────────────────────────

  build-operator:
    needs: [check-tag]
    if: needs.check-tag.outputs.is-tag == 'true'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ env.IMAGE_PREFIX }}/gateway-operator
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/operator.Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/gateway-operator,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=operator-${{ matrix.platform }}
          cache-to: type=gha,scope=operator-${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: operator-digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-operator:
    needs: [check-tag, build-operator]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: operator-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/gateway-operator
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_PREFIX }}/gateway-operator@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.IMAGE_PREFIX }}/gateway-operator:${{ steps.meta.outputs.version }}

  # ── Chaperone ──────────────────────────────────────────────────────────

  build-chaperone:
    needs: [check-tag]
    if: needs.check-tag.outputs.is-tag == 'true'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/chaperone.Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/gateway-chaperone,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=chaperone-${{ matrix.platform }}
          cache-to: type=gha,scope=chaperone-${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: chaperone-digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-chaperone:
    needs: [check-tag, build-chaperone]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: chaperone-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/gateway-chaperone
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_PREFIX }}/gateway-chaperone@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.IMAGE_PREFIX }}/gateway-chaperone:${{ steps.meta.outputs.version }}

  # ── Helm Chart ─────────────────────────────────────────────────────────

  publish-helm-chart:
    needs: [check-tag]
    if: needs.check-tag.outputs.is-tag == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Extract version
        id: version
        run: |
          VERSION=$(cat .version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "chart_version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Package Helm chart
        run: |
          helm package charts/varnish-gateway -d dist/charts --version ${{ steps.version.outputs.chart_version }} --app-version ${{ steps.version.outputs.version }}

      - name: Push Helm chart to OCI registry
        run: |
          helm push dist/charts/varnish-gateway-${{ steps.version.outputs.chart_version }}.tgz oci://${{ env.REGISTRY }}/varnish/charts
