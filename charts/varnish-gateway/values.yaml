# Default values for varnish-gateway
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Namespace where the operator will be installed
namespace: varnish-gateway-system

# Operator configuration
operator:
  # Number of operator replicas
  replicas: 1

  # Operator container image
  image:
    repository: ghcr.io/varnish/gateway-operator
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion
    tag: ""

  # Image pull secrets for the operator
  imagePullSecrets: []

  # Leader election settings
  leaderElection:
    enabled: true

  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  # Node selector (empty by default to schedule on any architecture)
  nodeSelector: {}

  # Security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65532

  # Probes
  livenessProbe:
    httpGet:
      path: /healthz
      port: health
    initialDelaySeconds: 15
    periodSeconds: 20

  readinessProbe:
    httpGet:
      path: /readyz
      port: health
    initialDelaySeconds: 5
    periodSeconds: 10

# Gateway class configuration
gatewayClass:
  # Name of the GatewayClass resource
  name: varnish

  # Controller name (must match what the operator expects)
  controllerName: varnish-software.com/gateway

  # Description
  description: Varnish-based Gateway implementation with caching support

  # Create default GatewayClassParameters
  createDefaultParams: true

  # Default parameters configuration
  defaultParams:
    # Name of the GatewayClassParameters resource
    name: varnish-params

    # User VCL configuration
    userVCL:
      enabled: true
      # ConfigMap containing user VCL
      configMap:
        name: varnish-user-vcl
        key: user.vcl

    # Logging configuration
    logging:
      enabled: true
      mode: varnishlog  # varnishlog or varnishncsa
      # format: "%h %l %u %t \"%r\" %s %b"  # For varnishncsa
      # extraArgs: []

    # Extra varnishd command-line arguments
    varnishdExtraArgs:
      - "-p"
      - "thread_pools=2"
      - "-s"
      - "malloc,512m"

    # Extra init containers for the gateway pods (e.g., downloading VMODs)
    extraInitContainers: []
    # - name: install-vmods
    #   image: curlimages/curl:latest
    #   command: ["curl", "-fsSL", "-o", "/dst/libvmod_example.so", "https://example.com/libvmod_example.so"]
    #   volumeMounts:
    #     - name: extra-vmods
    #       mountPath: /dst

    # Extra volumes for the gateway pods
    extraVolumes: []
    # - name: extra-vmods
    #   emptyDir: {}

    # Extra volume mounts for the varnish container
    extraVolumeMounts: []
    # - name: extra-vmods
    #   mountPath: /extra-vmods

# Chaperone (gateway data plane) configuration
chaperone:
  # Chaperone container image (used by operator to create Gateway pods)
  image:
    repository: ghcr.io/varnish/gateway-chaperone
    pullPolicy: IfNotPresent
    tag: ""

  # Image pull secrets for chaperone pods (comma-separated list)
  imagePullSecrets: ""

# RBAC configuration
rbac:
  # Create RBAC resources
  create: true

# Service account configuration
serviceAccount:
  # Create service account for operator
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use (if not creating)
  # name: ""

# Prometheus ServiceMonitor / PodMonitor configuration.
# Requires prometheus-operator CRDs (monitoring.coreos.com) to be installed
# in the cluster — e.g. via kube-prometheus-stack.
serviceMonitor:
  # Set to true to create ServiceMonitor (operator) and PodMonitor (chaperone).
  enabled: false
  # Scrape interval.
  interval: 30s
  # Scrape timeout.
  scrapeTimeout: 10s
  # Extra labels to add to the ServiceMonitor/PodMonitor objects. Commonly
  # used to match the Prometheus instance's serviceMonitorSelector — for
  # kube-prometheus-stack this is usually `release: <helm-release-name>`.
  labels: {}

# Grafana dashboards packaged as ConfigMaps for auto-discovery via the
# Grafana sidecar (kube-prometheus-stack, grafana-operator, etc).
dashboards:
  # Set to true to render each JSON under charts/varnish-gateway/dashboards/
  # into a ConfigMap. Canonical copies live in the same directory and can
  # also be imported by hand via Grafana's UI.
  enabled: false
  # Labels applied to the dashboard ConfigMaps. The default matches the
  # kube-prometheus-stack Grafana sidecar's selector (`grafana_dashboard=1`).
  labels:
    grafana_dashboard: "1"
  # Optional annotations — useful when the sidecar needs a folder hint.
  annotations: {}
    # grafana_folder: Varnish Gateway

# Additional labels to add to all resources
commonLabels: {}

# Additional annotations to add to all resources
commonAnnotations: {}
