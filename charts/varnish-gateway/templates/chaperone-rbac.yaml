{{- if .Values.rbac.create -}}
# Chaperone RBAC - ClusterRole and ClusterRoleBinding
#
# The chaperone needs cluster-wide access to EndpointSlices because:
# - HTTPRoutes can reference backend Services in any namespace (cross-namespace routing)
# - The chaperone watches EndpointSlices cluster-wide to discover backend pod IPs
#
# The operator creates a per-Gateway ClusterRoleBinding for each Gateway's
# ServiceAccount, so Gateways in any namespace get the correct permissions
# automatically.
#
# The ClusterRoleBinding below is a convenience for the operator's namespace
# and is not strictly required.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "varnish-gateway.fullname" . }}-chaperone
  labels:
    {{- include "varnish-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: chaperone
rules:
  # Watch EndpointSlices for backend discovery (cluster-wide for cross-namespace routing)
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  # Watch Services for port resolution
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  # Watch ConfigMaps for routing.json updates
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Cache invalidation: watch and process VarnishCacheInvalidation resources
  - apiGroups: ["gateway.varnish-software.com"]
    resources: ["varnishcacheinvalidations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.varnish-software.com"]
    resources: ["varnishcacheinvalidations/status"]
    verbs: ["get", "update", "patch"]
  # List pods to determine expected pod count for invalidation phase calculation
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
# ClusterRoleBinding for varnish-gateway-system namespace
# This grants all chaperone pods in the namespace access to cluster-wide EndpointSlices
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "varnish-gateway.fullname" . }}-chaperone
  labels:
    {{- include "varnish-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: chaperone
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "varnish-gateway.fullname" . }}-chaperone
subjects:
  - kind: Group
    name: system:serviceaccounts:{{ include "varnish-gateway.namespace" . }}
    apiGroup: rbac.authorization.k8s.io
{{- end }}
