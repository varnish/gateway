{{- if .Values.dashboards.enabled }}
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
{{- $name := regexReplaceAll "\\.json$" (base $path) "" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "varnish-gateway.fullname" $ }}-dashboard-{{ $name }}
  namespace: {{ include "varnish-gateway.namespace" $ }}
  labels:
    {{- include "varnish-gateway.labels" $ | nindent 4 }}
    {{- with $.Values.dashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $.Values.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{ $name }}.json: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
