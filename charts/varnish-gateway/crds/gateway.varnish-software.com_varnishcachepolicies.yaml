  names:
    kind: VarnishCachePolicy
    listKind: VarnishCachePolicyList
    plural: varnishcachepolicies
    shortNames:
    - vcp
    singular: varnishcachepolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef.kind
      name: Target Kind
      type: string
    - jsonPath: .spec.targetRef.name
      name: Target Name
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VarnishCachePolicy configures caching behavior for routes through a Varnish Gateway.
          Without a VCP, all routes operate in pass-through mode (no caching).
          Attaching a VCP to a Gateway or HTTPRoute enables Varnish caching for those routes.

          VCP is an Inherited Policy per Gateway API conventions:
          - VCP on Gateway: default for all routes through that gateway
          - VCP on HTTPRoute: overrides gateway defaults for all rules in the route
          - VCP on HTTPRoute rule (via sectionName): overrides for that specific rule
          Most specific wins. Override is complete replacement, not field-level merging.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VarnishCachePolicySpec defines the desired caching behavior.
            properties:
              bypass:
                description: |-
                  Bypass defines conditions under which caching is bypassed even when
                  this policy is active. Matching requests get pass-through behavior.
                properties:
                  headers:
                    description: Headers lists header conditions that trigger cache
                      bypass.
                    items:
                      description: HeaderBypassCondition defines a header-based cache
                        bypass rule.
                      properties:
                        name:
                          description: Name is the header name to check.
                          type: string
                        valueRegex:
                          description: |-
                            ValueRegex is an optional regex pattern to match against the header value.
                            If omitted, any value (or presence) of the header triggers bypass.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                type: object
              cacheKey:
                description: CacheKey customizes what makes a cache entry unique.
                properties:
                  headers:
                    description: |-
                      Headers lists request headers to include in the cache key.
                      Similar to Vary, but controlled by the operator, not the origin.
                    items:
                      type: string
                    type: array
                  queryParameters:
                    description: QueryParameters controls which query parameters are
                      part of the cache key.
                    properties:
                      exclude:
                        description: 'Exclude is a denylist: these params are excluded
                          from the cache key.'
                        items:
                          type: string
                        type: array
                      include:
                        description: 'Include is an allowlist: only these params matter
                          for caching.'
                        items:
                          type: string
                        type: array
                    type: object
                type: object
              defaultTTL:
                description: |-
                  DefaultTTL is used when the origin does NOT send Cache-Control headers.
                  Origin Cache-Control takes precedence. Mutually exclusive with ForcedTTL.
                type: string
              forcedTTL:
                description: |-
                  ForcedTTL overrides origin Cache-Control entirely.
                  Use when the origin misbehaves or you need operator-level control.
                  Mutually exclusive with DefaultTTL.
                type: string
              grace:
                description: |-
                  Grace is how long to serve stale content while asynchronously revalidating.
                  Equivalent to stale-while-revalidate in HTTP semantics.
                  Default: 0 (disabled)
                type: string
              keep:
                description: |-
                  Keep is how long to keep stale objects for serving when all backends are sick.
                  Equivalent to stale-if-error in HTTP semantics.
                  Default: 0 (disabled)
                type: string
              requestCoalescing:
                description: |-
                  RequestCoalescing enables collapsed forwarding: when multiple clients request
                  the same uncached object simultaneously, only one request goes to the backend.
                  Default: true
                type: boolean
              targetRef:
                description: |-
                  TargetRef identifies the Gateway or HTTPRoute this policy applies to.
                  For per-rule targeting, set sectionName to the rule's name.
                properties:
                  group:
                    description: Group is the group of the target resource.
                    type: string
                  kind:
                    description: Kind is kind of the target resource.
                    type: string
                  name:
                    description: Name is the name of the target resource.
                    type: string
                  sectionName:
                    description: SectionName targets a specific named rule within
                      an HTTPRoute.
                    type: string
                required:
                - group
                - kind
                - name
                type: object
            required:
            - targetRef
            type: object
          status:
            description: VarnishCachePolicyStatus defines the observed state of VarnishCachePolicy.
            properties:
              ancestors:
                description: Ancestors is the list of ancestor objects that this policy
                  is relevant for.
                items:
                  description: VarnishCachePolicyAncestorStatus describes the status
                    of a policy with respect to an ancestor.
                  properties:
                    ancestorRef:
                      description: |-
                        AncestorRef corresponds with a ParentRef in the spec that this
                        PolicyAncestorStatus struct describes the status of.
                      properties:
                        group:
                          description: Group is the group of the target resource.
                          type: string
                        kind:
                          description: Kind is kind of the target resource.
                          type: string
                        name:
                          description: Name is the name of the target resource.
                          type: string
                        sectionName:
                          description: SectionName targets a specific named rule within
                            an HTTPRoute.
                          type: string
                      required:
                      - group
                      - kind
                      - name
                      type: object
                    conditions:
                      description: Conditions describe the status of the policy.
                      items:
                        description: Condition contains details for one aspect of
                          the current state of this API Resource.
                        properties:
                          lastTransitionTime:
                            description: |-
                              lastTransitionTime is the last time the condition transitioned from one status to another.
                              This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                            format: date-time
                            type: string
                          message:
                            description: |-
                              message is a human readable message indicating details about the transition.
                              This may be an empty string.
                            maxLength: 32768
                            type: string
                          observedGeneration:
                            description: |-
                              observedGeneration represents the .metadata.generation that the condition was set based upon.
                              For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                              with respect to the current state of the instance.
                            format: int64
                            minimum: 0
                            type: integer
                          reason:
                            description: |-
                              reason contains a programmatic identifier indicating the reason for the condition's last transition.
                              Producers of specific condition types may define expected values and meanings for this field,
                              and whether the values are considered a guaranteed API.
                              The value should be a CamelCase string.
                              This field may not be empty.
                            maxLength: 1024
                            minLength: 1
                            pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                            type: string
                          status:
                            description: status of the condition, one of True, False,
                              Unknown.
                            enum:
                            - "True"
                            - "False"
                            - Unknown
                            type: string
                          type:
                            description: type of condition in CamelCase or in foo.example.com/CamelCase.
                            maxLength: 316
                            pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                            type: string
                        required:
                        - lastTransitionTime
                        - message
                        - reason
                        - status
                        - type
                        type: object
                      type: array
                    controllerName:
                      description: ControllerName is the name of the controller that
                        wrote this status.
                      type: string
                  required:
                  - ancestorRef
                  - controllerName
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
